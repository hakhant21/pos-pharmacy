services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: backend
        working_dir: /var/www/html
        environment:
            APP_URL: ${APP_URL:-http://localhost:9000}
            ASSET_URL: ${ASSET_URL:-http://localhost:5173}
            DB_CONNECTION: ${DB_DB_CONNECTION:-sqlite}
            DB_DATABASE:
        ports:
            - "9000:9000"
        volumes:
            - ./:/var/www/html
            - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf
        restart: unless-stopped
        command: ["supervisord", "-c", "/etc/supervisor/supervisord.conf"]
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
