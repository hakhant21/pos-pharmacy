services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: backend
        working_dir: /var/www/html
        ports:
            - "9000:9000"
        volumes:
            - ./:/var/www/html
            - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf
        restart: unless-stopped
        command: ["supervisord", "-c", "/etc/supervisor/supervisord.conf"]
        networks:
            - app-network

    mysql:
        image: mysql:latest
        container_name: mysql
        environment:
            TZ: "Asia/Yangon"
            MYSQL_DATABASE: ${DB_DATABASE:-fms}
            MYSQL_PASSWORD: ${DB_PASSWORD:-fms}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-fms}
        volumes:
            - ./docker/mysql/data:/var/lib/mysql/
        ports:
            - "${DB_PORT:-3306}:3306"
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "--password=$${MYSQL_ROOT_PASSWORD}",
                ]
            timeout: 20s
            retries: 10
        networks:
            - app-network
networks:
    app-network:
        driver: bridge
